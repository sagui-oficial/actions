name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node & PNPM
        uses: ./packages/setup-node-pnpm

      - name: Lint
        run: pnpm lint

      - name: Validate actions
        run: pnpm -r run validate

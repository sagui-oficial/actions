name: Notify Teams
description: Send a notification to Microsoft Teams via webhook
author: sagui-oficial

inputs:
  github-token:
    description: GitHub token for authentication
    required: true
  webhook-uri:
    description: Microsoft Teams webhook URI
    required: true
  build-version:
    description: Build version to include in the notification
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Send Teams notification
      shell: bash
      run: bash ${{ github.action_path }}/message.sh
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        WEBHOOK_URI: ${{ inputs.webhook-uri }}
        BUILD_VERSION: ${{ inputs.build-version }}
        REPO_NAME: ${{ github.repository }}
        WORKFLOW_NAME: ${{ github.workflow }}
        RUN_STATUS: ${{ job.status }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        ACTOR: ${{ github.actor }}
        REF: ${{ github.ref_name }}
